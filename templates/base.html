<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Yard Keepers</title>
    
    <!-- Dynamic Context-Aware Favicon Insertion -->
    <link rel="icon" type="image/png" href="{{base_url}}/assets/YK_favicon.png">

    <!-- Font Awesome Kit for High-Quality Brand Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4caf50;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --header-height: 60px;
            
            /* Social Brand Color Profiles */
            --instagram-color: #e1306c;
            --facebook-color: #1877f2;
            --pinterest-color: #bd081c;
            --youtube-color: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-top: var(--header-height);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background-color: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo a {
            display: flex;
            align-items: center;
            height: var(--header-height);
            text-decoration: none;
        }

        .logo img {
            height: 42px;
            width: auto;
            object-fit: contain;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            z-index: 1100;
        }

        .hamburger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--text-color);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        nav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            background-color: var(--surface-color);
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
            transition: right 0.3s ease;
            padding: calc(var(--header-height) + 20px) 20px 20px 20px;
            z-index: 1050;
        }

        nav.active { right: 0; }
        nav ul { list-style: none; display: flex; flex-direction: column; gap: 15px; }
        nav a { color: var(--text-color); text-decoration: none; font-size: 1.1rem; display: block; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: color 0.2s; }
        nav a:hover { color: var(--primary-color); }

        main { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; color: #ffffff; }

        .tags { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; margin-bottom: 30px; }
        .tags li { background-color: var(--surface-color); border: 1px solid var(--border-color); color: var(--primary-color); padding: 4px 12px; border-radius: 16px; font-size: 0.85rem; font-weight: 500; }

        article { font-size: 1.05rem; }
        article p { margin-bottom: 20px; }
        article h2 { margin: 30px 0 15px 0; color: #ffffff; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        article h3 { margin: 20px 0 10px 0; color: var(--primary-color); }
        article ul, article ol { margin-bottom: 20px; padding-left: 20px; }
        article li { margin-bottom: 8px; }
        article a { color: var(--primary-color); text-decoration: none; }
        article a:hover { text-decoration: underline; }

        /* Social UI Component Styling */
        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            list-style: none !important;
            padding-left: 0 !important;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 8px;
            color: var(--text-color) !important;
            text-decoration: none !important;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.2s;
        }

        .social-link:hover {
            background-color: #252525;
            transform: translateX(4px);
            text-decoration: none !important;
        }

        .social-link i { font-size: 1.4rem; width: 24px; text-align: center; }
        .social-link.instagram i { color: var(--instagram-color); }
        .social-link.facebook i { color: var(--facebook-color); }
        .social-link.pinterest i { color: var(--pinterest-color); }
        .social-link.youtube i { color: var(--youtube-color); }

        /* Map Responsive Container Element */
        .map-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .map-container iframe {
            display: block;
            filter: grayscale(0.2) invert(0.9) hue-rotate(60deg); /* Blends standard map colors subtly into dark layouts */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="{{base_url}}/">
                <img src="{{base_url}}/assets/Yard_Keepers.png" alt="Yard Keepers Logo">
            </a>
        </div>
        <button class="hamburger" id="menuToggle" aria-label="Toggle Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav id="sideNav">
        <ul>
            <li><a href="{{base_url}}/">Home</a></li>
            <li><a href="{{base_url}}/services/">Services</a></li>
            <li><a href="{{base_url}}/area/">Service Area</a></li>
            <li><a href="{{base_url}}/contact/">Contact Us</a></li>
        </ul>
    </nav>

    <main>
        <h1>{{title}}</h1>
        <div class="tag-container">
            {{tags}}
        </div>
        <article>
            {{content}}
        </article>
    </main>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sideNav = document.getElementById('sideNav');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            sideNav.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!sideNav.contains(e.target) && !menuToggle.contains(e.target) && sideNav.classList.contains('active')) {
                menuToggle.classList.remove('active');
                sideNav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
